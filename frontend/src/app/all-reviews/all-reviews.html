<div class="all-reviews-page">
    <div class="top-nav-bar">
        <a routerLink="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <div class="reviews-hero">
        <div class="hero-pattern"></div>
        <div class="hero-content">
            <span class="badge">Community Voices</span>
            <h1>Plant Lovers Speak</h1>
            <p>Real experiences, honest feedback, and growing stories from our amazing community of plant parents.</p>
        </div>
    </div>

    <div class="reviews-grid-container">
        <div class="reviews-grid" *ngIf="reviews().length > 0; else noReviews">
            <div class="review-card" *ngFor="let review of reviews()">
                <div class="review-stars">
                    <i class="fas fa-star" *ngFor="let s of [1,2,3,4,5]" [class.filled]="review.rating >= s"></i>
                </div>
                <p class="review-text">"{{ review.description }}"</p>
                <div class="review-author">
                    <div class="author-info">
                        <strong>{{ review.userName }}</strong>
                        <span>{{ review.date }}</span>
                    </div>
                </div>
            </div>
        </div>
        <ng-template #noReviews>
            <div class="no-reviews-msg">
                <i class="fas fa-comment-slash"></i>
                <p>No reviews yet. Be the first to leave one after your purchase!</p>
            </div>
        </ng-template>
    </div>
</div>
