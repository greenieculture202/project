<section id="placements" class="placements-section">
    <div class="container">
        <h2 class="section-title">Plants By Placement</h2>
        <div class="title-underline"></div>

        <div class="offers-loading" *ngIf="isLoading" style="text-align: center; padding: 50px;">
            <div class="spinner"></div>
            <p>Curating your green experiences...</p>
        </div>

        <div class="placements-grid" *ngIf="!isLoading">
            <div class="placement-card" *ngFor="let item of placements; let i = index" [class]="'card-' + i">
                <div class="card-image-wrapper">
                    <img [src]="item.image" [alt]="item.name" class="placement-image" loading="lazy">
                    <div class="card-overlay">
                        <p class="placement-desc">{{ item.description.substring(0, 60) }}...</p>
                        <button class="video-btn" (click)="openVideo(item)">
                            <span class="btn-icon">▶</span> Video
                        </button>
                    </div>
                </div>
                <h3 class="placement-name">{{ item.name }}</h3>
            </div>
        </div>
    </div>

    <!-- Video Modal - Full Screen Video -->
    <div class="modal-backdrop" *ngIf="isModalOpen" (click)="closeModal()">
        <div class="modal-content" (click)="$event.stopPropagation()">
            <button class="close-btn" (click)="closeModal()">&times;</button>
            <div class="video-wrapper">
                <div class="video-container">
                    <ng-container *ngIf="selectedPlacement && selectedVideo">
                        <!-- Embedded Video Player (YouTube, Pinterest, etc.) -->
                        <iframe *ngIf="!selectedPlacement.isLocal" [src]="selectedVideo" frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                            allowfullscreen class="embed-video">
                        </iframe>

                        <!-- Local Video Player (Direct MP4 links) -->
                        <video *ngIf="selectedPlacement.isLocal" [src]="selectedVideo" controls autoplay
                            (ended)="onVideoEnded()" class="local-video">
                        </video>

                    </ng-container>

                    <!-- View Plants Overlay Button -->
                    <div class="video-end-overlay" *ngIf="showViewPlantsBtn && !showShopPlantsModal">
                        <button class="view-plants-btn" (click)="toggleShopPlants()">
                            View Plants <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                    <!-- Nested Pop-up showing Plants -->
                    <div class="shop-plants-backdrop" *ngIf="showShopPlantsModal" (click)="toggleShopPlants()">
                        <div class="shop-plants-panel" (click)="$event.stopPropagation()">
                            <div class="panel-header">
                                <h3>Featured Plants</h3>
                                <button class="close-panel-btn" (click)="toggleShopPlants()">&times;</button>
                            </div>
                            
                            <div class="panel-loading" *ngIf="isLoadingPlants">
                                <div class="spinner"></div>
                                <p>Finding perfect plants...</p>
                            </div>
                            
                            <div class="panel-empty" *ngIf="!isLoadingPlants && relatedPlants.length === 0">
                                <p>No specific plants found for this placement.</p>
                                <button class="view-plants-btn" (click)="navigateToCategory()" style="margin-top:20px; font-size:1rem; padding: 12px 24px;">Browse Category</button>
                            </div>

                            <div class="plants-grid-popup" *ngIf="!isLoadingPlants && relatedPlants.length > 0">
                                <div class="plant-card-popup" *ngFor="let plant of relatedPlants" (click)="navigateToProduct(plant.slug, plant.name)">
                                    <img [src]="plant.image" [alt]="plant.name">
                                    <div class="plant-info">
                                        <h4 class="plant-name-popup">{{ plant.name }}</h4>
                                        <div class="price-container">
                                            <p class="plant-price">₹{{ plant.price }}</p>
                                            <p class="original-price" *ngIf="plant.originalPrice">₹{{ plant.originalPrice }}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
