<div class="product-tabs-container">
    <div class="products-wrapper">
        <!-- Tabs Header -->
        <div class="tabs-header">
            <button *ngFor="let tab of tabs" [class.active]="activeTab === tab" (click)="setActiveTab(tab)"
                class="tab-btn">
                {{ tab }}
            </button>
        </div>

        <!-- Slider Navigation -->
        <button class="slider-arrow prev-arrow" *ngIf="showArrows" (click)="scrollLeft()">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="slider-arrow next-arrow" *ngIf="showArrows" (click)="scrollRight()">
            <i class="fas fa-chevron-right"></i>
        </button>

        <!-- Product Slider -->
        <div class="products-slider" #sliderRef>
            <div class="product-card" *ngFor="let product of currentProducts"
                [routerLink]="['/product', getSlug(product.name)]" style="cursor: pointer;">
                <div class="image-container">
                    <img [src]="product.image" [alt]="product.name" class="product-img main-img" loading="lazy">
                    <img [src]="(product.images && product.images.length > 0) ? product.images[0] : (product.hoverImage || product.image)" [alt]="product.name" class="product-img hover-img"
                        loading="lazy">
                    <span class="discount-badge" *ngIf="product.discount && !hasOfferTag(product)">{{ product.discount }}</span>
                <span class="offer-badge" *ngIf="hasOfferTag(product)">
                    <i class="fas fa-gift"></i> {{ getOfferBenefit(product) }}
                </span>
                <span class="regional-badge" *ngIf="product.isRegionalFavorite">
                        <i class="fas fa-map-marker-alt"></i> Trending in {{ userState }}
                    </span>
                </div>
                <div class="product-info">
                    <h3 class="product-title">{{ product.name }}</h3>
                    <div class="price-container">
                        <span class="current-price">₹{{ product.price }}</span>
                        <span class="original-price" *ngIf="product.originalPrice">₹{{ product.originalPrice }}</span>
                        <span class="discount-text" *ngIf="product.discountPercent">{{ product.discountPercent }}%
                            OFF</span>
                    </div>
                    <div class="product-tags" *ngIf="product.tags && product.tags.length > 0">
                        <span class="tag" [ngClass]="getTagClass(tag)" *ngFor="let tag of product.tags.slice(0, 2)">{{
                            tag }}</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- View All Button -->
        <div class="view-all-container">
            <a [routerLink]="['/products', activeTab]" class="view-all-btn">View All <i
                    class="fas fa-chevron-right ml-2"></i></a>
        </div>
    </div>
</div>
